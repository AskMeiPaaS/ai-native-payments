# ==========================================
# 🚀 CORE SPRING & PERFORMANCE
# ==========================================
spring.application.name=ai-native-payments

# ==========================================
# 🩺 ACTUATOR / HEALTH
# ==========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Enable Java 25 Virtual Threads for high-concurrency AI orchestration
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}

# Async request timeout — must be >= LLM inference time on slow hardware (10 min)
spring.mvc.async.request-timeout=600000

# Server Port Configuration
server.port=${APP_PORT:8080}

# ==========================================
# 🍃 MONGODB DUAL-DATABASE CONFIGURATION
# ==========================================
# Primary Database (Semantic Memory, Transactions, Profiles)
spring.data.mongodb.primary.uri=${PRIMARY_MONGO_URI:mongodb://mongodb-atlas:27017/pass_main}
spring.data.mongodb.primary.database=${PRIMARY_DB_NAME:pass_main}

# Audit Database (Isolated Compliance & XAI Logs)
spring.data.mongodb.audit.uri=${AUDIT_MONGO_URI:mongodb://mongodb-atlas:27017/pass_audit}
spring.data.mongodb.audit.database=${AUDIT_DB_NAME:pass_audit}

# HITL Database (Human-In-The-Loop Freeze States)
spring.data.mongodb.hitl.uri=${HITL_MONGO_URI:mongodb://mongodb-atlas:27017/pass_hitl}
spring.data.mongodb.hitl.database=${HITL_DB_NAME:pass_hitl}

# Memory Database (LangChain4j per-session chat history)
spring.data.mongodb.memory.uri=${MEMORY_MONGO_URI:mongodb://mongodb-atlas:27017/pass_memory}
spring.data.mongodb.memory.database=${MEMORY_DB_NAME:pass_memory}

# Transaction Support (Required for ACID-compliant Tool Execution)
spring.data.mongodb.transaction-manager=true

# ==========================================
# 🔧 MONGODB CONNECTION POOL OPTIMIZATION
# ==========================================
# Primary Database Pool Configuration
spring.data.mongodb.primary.driver.maxPoolSize=50
spring.data.mongodb.primary.driver.minPoolSize=10
spring.data.mongodb.primary.driver.maxConnectionIdleTimeMS=30000
spring.data.mongodb.primary.driver.maxConnectionLifeTimeMS=300000
spring.data.mongodb.primary.driver.waitQueueTimeoutMS=10000
spring.data.mongodb.primary.driver.socketTimeoutMS=30000

# Audit Database Pool Configuration
spring.data.mongodb.audit.driver.maxPoolSize=20
spring.data.mongodb.audit.driver.minPoolSize=5
spring.data.mongodb.audit.driver.maxConnectionIdleTimeMS=30000
spring.data.mongodb.audit.driver.maxConnectionLifeTimeMS=300000
spring.data.mongodb.audit.driver.waitQueueTimeoutMS=10000

# HITL Database Pool Configuration
spring.data.mongodb.hitl.driver.maxPoolSize=10
spring.data.mongodb.hitl.driver.minPoolSize=2
spring.data.mongodb.hitl.driver.maxConnectionIdleTimeMS=30000
spring.data.mongodb.hitl.driver.maxConnectionLifeTimeMS=300000
spring.data.mongodb.hitl.driver.waitQueueTimeoutMS=10000

# ==========================================
# 🧠 AI-NATIVE ORCHESTRATION 
# ==========================================
# Generic Embedding Variables
# Using Voyage AI official API
app.ai.embedding.api-key=${VOYAGE_API_KEY:}
app.ai.embedding.model-name=${EMBEDDING_MODEL_NAME:voyage-4}

# Generic Reranker Variables
# Using Voyage AI reranker via official API
app.ai.reranker.api-key=${VOYAGE_API_KEY:}
app.ai.reranker.model-name=${RERANKER_MODEL_NAME:rerank-lite-1}
app.ai.reranker.top-k=${RERANKER_TOP_K:2}

# Generic LLM Variables
# Using llama2 from Ollama service
app.ai.llm.base-url=${LLM_BASE_URL:http://ollama:11434}
app.ai.llm.model-name=${LLM_MODEL_NAME:llama2}
app.ai.llm.temperature=${LLM_TEMPERATURE:0.7}
app.ai.llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:600}
app.ai.llm.num-ctx=${LLM_NUM_CTX:4096}
app.ai.llm.num-predict=${LLM_NUM_PREDICT:1024}

# Generic HTTP Client Variables
app.ai.http.connect-timeout-seconds=${HTTP_CONNECT_TIMEOUT:10}
app.ai.http.request-timeout-seconds=${HTTP_REQUEST_TIMEOUT:600}

# ==========================================
# 🏗️ CUSTOM APP PROPERTIES (AI-NATIVE LIMITS)
# ==========================================
# Threshold for autonomous PaSS execution vs HITL fallback
app.ai.execute-threshold=${AUTO_EXECUTE_THRESHOLD:0.95}

# Collection Mappings (Injectable into Services)
app.mongodb.collections.profiles=${COLLECTION_PROFILES:user_profiles}
app.mongodb.collections.transactions=${COLLECTION_TRANSACTIONS:transactions}
app.mongodb.collections.audit=${COLLECTION_AUDIT:system_audit_logs}
app.mongodb.index.vector=${VECTOR_INDEX_NAME:behavioral_vector_index}

# ==========================================
# 📋 LOGGING & AUDIT
# ==========================================
logging.level.com.ayedata=DEBUG
logging.level.dev.langchain4j=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# 🔒 SECURITY & CORS
# ==========================================
# CORS allowed origins (restrict to frontend domain(s))
# For development: http://localhost:3000,http://agent-ui:3000
# For production: Configure via environment variable with comma-separated origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://agent-ui:3000}